<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>人类工具进化史 - 合成游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;overscroll-behavior:none}
body{height:100%;overflow:hidden}
:root{--bg:#080818;--bg2:#0e0e28;--card:#161640;--card2:#1e1e50;--accent:#f0a030;--accent2:#e94560;--gold:#ffd700;--text:#e0e0f0;--text2:#7878a0;--success:#4ecca3;--border:#282858;--stone:#cd853f;--bronze:#daa520;--iron:#8898b0;--industrial:#e07020;--info:#9060e0}
@keyframes discoverPop{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.25) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) translate(0,0)}50%{opacity:1;transform:scale(1) translate(var(--tx),var(--ty))}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,160,48,0.3)}50%{box-shadow:0 0 0 8px rgba(240,160,48,0)}}
@keyframes drawLine{from{stroke-dashoffset:2000}to{stroke-dashoffset:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,var(--bg2),var(--card));padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.header h1{font-size:1.2em;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;white-space:nowrap}
.progress-wrap{display:flex;align-items:center;gap:8px;flex:1;max-width:300px;min-width:120px}
.progress-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--gold));border-radius:4px;transition:width .5s}
.progress-text{font-size:.75em;color:var(--text2);white-space:nowrap}
.era-badge{padding:3px 12px;border-radius:14px;font-size:.75em;font-weight:bold;border:2px solid;white-space:nowrap;transition:all .5s}
.hbtn{padding:5px 12px;border-radius:8px;font-size:.75em;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .3s;white-space:nowrap}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.main{display:flex;height:calc(100vh - 50px);height:calc(100dvh - 50px);overflow:hidden}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 16px;position:relative;background:radial-gradient(ellipse at center,#0c0c24 0%,var(--bg) 70%);overflow-y:auto;gap:8px}
.ws-hint{color:var(--text2);font-size:.82em;text-align:center}
.craft-area{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;min-height:90px}
.craft-slot{width:80px;height:88px;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.015);position:relative}
.craft-slot:hover{border-color:var(--accent);background:rgba(240,160,48,.04)}
.craft-slot.drag-over{border-color:var(--gold);background:rgba(255,215,0,.08);transform:scale(1.04)}
.craft-slot.filled{border-style:solid;border-color:var(--accent);background:rgba(240,160,48,.06);animation:float 2.5s ease-in-out infinite}
.craft-slot .se{font-size:2em;line-height:1}
.craft-slot .sn{font-size:.6em;color:var(--text2);margin-top:1px;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.craft-slot .sx{position:absolute;top:1px;right:3px;font-size:.65em;color:var(--accent2);cursor:pointer;opacity:0;transition:opacity .2s}
.craft-slot:hover .sx{opacity:1}
.craft-plus{font-size:1.4em;color:var(--text2);font-weight:bold}
.tool-slot-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.tool-slot{width:64px;height:70px;border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;background:rgba(100,200,255,.02);position:relative}
.tool-slot:hover{border-color:#60a0d0}
.tool-slot.filled{border-style:solid;border-color:#60a0d0;background:rgba(100,200,255,.06)}
.tool-slot .se{font-size:1.6em;line-height:1}
.tool-slot .sn{font-size:.55em;color:var(--text2);margin-top:1px;text-align:center;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-slot .sx{position:absolute;top:1px;right:2px;font-size:.6em;color:var(--accent2);cursor:pointer;opacity:0;transition:opacity .2s}
.tool-slot:hover .sx{opacity:1}
.tool-label{font-size:.7em;color:var(--text2)}
.process-section{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:520px}
.process-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.pbtn{padding:5px 10px;border-radius:7px;font-size:.7em;border:2px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.pbtn:hover:not(.locked){border-color:var(--accent);color:var(--accent)}
.pbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.08);box-shadow:0 0 8px rgba(255,215,0,.15)}
.pbtn.locked{opacity:.3;cursor:not-allowed}
.pbtn .pi{font-size:1em}
.pbtn .pt{font-size:.8em;opacity:.5}
.cond-section{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;width:100%;max-width:520px}
.cond-tag{padding:3px 8px;border-radius:6px;font-size:.65em;border:1px solid var(--border);background:var(--card);color:var(--text2);display:flex;align-items:center;gap:3px}
.cond-tag.met{border-color:var(--success);color:var(--success)}
.cond-tag.unmet{border-color:var(--accent2);color:var(--accent2);opacity:.6}
.temp-section{display:flex;align-items:center;gap:10px}
.temp-bar{width:18px;height:60px;background:var(--bg);border-radius:9px;border:1px solid var(--border);position:relative;overflow:hidden}
.temp-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 9px 9px;transition:height .5s,background .5s}
.temp-info{font-size:.7em;color:var(--text2);line-height:1.5}
.temp-info b{color:var(--accent)}
.action-row{display:flex;gap:8px;align-items:center}
.cbtn{padding:8px 30px;font-size:.95em;font-weight:bold;border:none;border-radius:9px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.cbtn.active{background:linear-gradient(135deg,var(--accent),#c88020);color:#fff;box-shadow:0 3px 12px rgba(240,160,48,.35)}
.cbtn.active:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(240,160,48,.45)}
.cbtn.disabled{background:var(--border);color:var(--text2);cursor:not-allowed}
.clrbtn{padding:6px 14px;font-size:.75em;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--text2);cursor:pointer;transition:all .3s}
.clrbtn:hover{border-color:var(--accent2);color:var(--accent2)}
.result-area{min-height:60px;display:flex;align-items:center;justify-content:center}
.result-item{animation:discoverPop .6s ease-out;display:flex;flex-direction:column;align-items:center;gap:2px}
.result-item .re{font-size:2.6em}
.result-item .rn{font-size:.95em;font-weight:bold;color:var(--gold)}
.result-item .ra{font-size:.65em;padding:1px 7px;border-radius:8px}
.fail-text{color:var(--accent2);font-size:.85em;animation:shake .4s ease}
.sidebar{width:280px;background:var(--bg2);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-head h2{font-size:.9em;color:var(--gold)}
.filter-row{display:flex;gap:2px;flex-wrap:wrap;padding:6px 8px;border-bottom:1px solid var(--border)}
.fbtn{padding:2px 6px;font-size:.65em;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .3s;white-space:nowrap}
.fbtn:hover,.fbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.06)}
.igrid{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:5px;align-content:start}
.igrid::-webkit-scrollbar{width:4px}
.igrid::-webkit-scrollbar-track{background:var(--bg)}
.igrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.icard{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 2px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:grab;transition:all .25s;min-height:66px}
.icard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.4)}
.icard:active{cursor:grabbing;transform:scale(.95)}
.icard .ie{font-size:1.5em;line-height:1}
.icard .iname{font-size:.55em;color:var(--text2);text-align:center;margin-top:1px;line-height:1.2;max-width:58px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.icard.newi{animation:discoverPop .5s ease-out}
.sb-hint{padding:8px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.sb-hint h3{font-size:.7em;color:var(--accent);margin-bottom:3px}
.sb-hint p{font-size:.65em;color:var(--text2);line-height:1.5}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.mbox{background:var(--bg2);border:2px solid var(--border);border-radius:14px;max-width:90vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.mhead{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h2{font-size:1em;color:var(--gold)}
.mclose{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:1.1em;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.mclose:hover{border-color:var(--accent2);color:var(--accent2)}
.mbody{flex:1;overflow:auto;padding:16px}
.disc-m .mbox{max-width:340px;text-align:center}
.de{font-size:3.5em;display:block;margin:8px 0;animation:discoverPop .6s ease-out}
.dn{font-size:1.4em;font-weight:bold;color:var(--gold);margin-bottom:4px}
.da{display:inline-block;padding:3px 12px;border-radius:10px;font-size:.8em;margin-bottom:6px}
.dd{color:var(--text2);font-size:.85em;margin-bottom:4px}
.dr{font-size:.7em;color:var(--text2);background:var(--card);padding:5px 10px;border-radius:6px;display:inline-block;margin-top:3px}
.dreq{font-size:.7em;color:var(--accent);margin-top:3px}
.tree-m .mbox{width:95vw;max-width:1400px;height:85vh}
.tc{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab;touch-action:none}
.tc:active{cursor:grabbing}
.tc-inner{position:absolute;transform-origin:0 0;will-change:transform}
.tc svg{position:absolute;top:0;left:0;pointer-events:none}
.tc-zoom{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10}
.tc-zoom button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tc-zoom button:hover{background:var(--card2);border-color:var(--gold)}
.tc-zoom .zlabel{font-size:.55em;text-align:center;color:var(--text2);padding:2px 0}
.tc-minimap{position:absolute;bottom:12px;left:12px;width:120px;height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:10;opacity:.7}
.tc-minimap:hover{opacity:1}
.tc-minimap canvas{width:100%;height:100%}
.tc-vp{position:absolute;border:1.5px solid var(--gold);border-radius:2px;pointer-events:none}
.tn{position:absolute;width:64px;display:flex;flex-direction:column;align-items:center;padding:3px 1px;border-radius:7px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .3s;z-index:2}
.tn:hover{border-color:var(--gold);transform:scale(1.08);z-index:3}
.tn.disc{border-color:var(--accent)}
.tn.undisc{opacity:.25;filter:grayscale(1)}
.tn .te{font-size:1.3em;line-height:1}
.tn .tt{font-size:.45em;color:var(--text2);text-align:center;margin-top:1px;max-width:58px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl{position:absolute;left:0;width:100%;text-align:center;font-size:.65em;color:var(--text2);opacity:.4;pointer-events:none}
.enc-m .mbox{width:90vw;max-width:800px;height:80vh}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;display:flex;gap:8px;align-items:flex-start}
.ecard .ee{font-size:1.8em;flex-shrink:0}
.ecard .ei{flex:1;min-width:0}
.ecard .en{font-size:.85em;font-weight:bold;color:var(--gold)}
.ecard .ea{font-size:.6em;padding:1px 5px;border-radius:6px;display:inline-block;margin:1px 0}
.ecard .ed{font-size:.65em;color:var(--text2);line-height:1.3}
.ecard .er{font-size:.55em;color:var(--text2);margin-top:3px;opacity:.6}
@media(max-width:768px){
body{padding-bottom:env(safe-area-inset-bottom)}
.header{padding:4px 8px;gap:3px;padding-top:calc(4px + env(safe-area-inset-top,0px))}
.header h1{font-size:.75em}
.hbtn{padding:3px 6px;font-size:.55em}
.progress-wrap{gap:4px;min-width:80px}
.progress-bar{height:6px}
.progress-text{font-size:.6em}
.era-badge{padding:2px 8px;font-size:.6em}
.main{flex-direction:column;height:calc(100vh - 38px - env(safe-area-inset-top,0px) - 46px);height:calc(100dvh - 38px - env(safe-area-inset-top,0px) - 46px)}
.workspace{min-height:0;flex:0 0 50%;padding:4px 6px;gap:3px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.sidebar{width:100%;flex:1;border-left:none;border-top:2px solid var(--border);display:flex;min-height:0}
.main.craft-full .sidebar{display:none}
.main.craft-full .workspace{flex:1}
.main.inv-full .workspace{display:none}
.main.inv-full .sidebar{flex:1}
.craft-area{gap:3px;min-height:50px;flex-wrap:wrap;justify-content:center}
.craft-slot{width:48px;height:56px;border-radius:7px}
.craft-slot .se{font-size:1.2em}
.craft-slot .sn{font-size:.38em;max-width:42px}
.craft-slot .sx{opacity:1;font-size:.65em;right:1px;top:0}
.craft-plus{font-size:.9em}
.tool-slot-wrap{gap:3px;margin-top:1px;justify-content:center}
.tool-slot{width:42px;height:48px;border-radius:6px}
.tool-slot .se{font-size:1.1em}
.tool-slot .sn{font-size:.38em;max-width:36px}
.tool-slot .sx{opacity:1;font-size:.55em}
.tool-label{font-size:.48em}
.process-section{gap:2px}
.process-row{gap:1px;justify-content:center}
.pbtn{padding:2px 4px;font-size:.45em;border-radius:4px}
.cond-section{gap:2px;justify-content:center}
.cond-tag{font-size:.4em;padding:1px 4px}
.temp-section{gap:3px;justify-content:center}
.temp-bar{width:10px;height:32px}
.temp-info{font-size:.45em;line-height:1.2}
.action-row{gap:3px;justify-content:center}
.cbtn{padding:4px 14px;font-size:.68em;border-radius:6px}
.clrbtn{padding:2px 6px;font-size:.5em}
.result-area{min-height:35px}
.result-item .re{font-size:1.8em}
.result-item .rn{font-size:.65em}
.ws-hint{font-size:.52em}
.igrid{grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:3px;padding:4px}
.icard{min-height:44px;padding:2px 1px;border-radius:5px}
.icard .ie{font-size:1.05em}
.icard .iname{font-size:.38em}
.sb-head{padding:3px 6px}
.sb-head h2{font-size:.68em}
.filter-row{padding:2px 4px;gap:1px}
.fbtn{padding:1px 3px;font-size:.45em}
.sb-hint{padding:3px 6px}
.sb-hint h3{font-size:.5em}
.sb-hint p{font-size:.45em}
.mob-tab{display:flex}
.egrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.ecard .ee{font-size:1.3em}
.ecard .en{font-size:.7em}
.ecard .ed{font-size:.5em}
.ecard .er{font-size:.4em}
.mbox{max-width:95vw;max-height:85vh;border-radius:10px}
.mhead{padding:6px 10px}
.mhead h2{font-size:.8em}
.mbody{padding:8px}
.de{font-size:2.8em}
.dn{font-size:1.1em}
.da{font-size:.7em}
.dd{font-size:.75em}
.dr{font-size:.6em}
.dreq{font-size:.6em}
}
@media(max-width:768px) and (orientation:landscape) and (max-height:500px){
.main{flex-direction:row;height:calc(100vh - 38px - env(safe-area-inset-top,0px) - 46px);height:calc(100dvh - 38px - env(safe-area-inset-top,0px) - 46px)}
.workspace{flex:1;min-height:0;border-right:2px solid var(--border)}
.sidebar{flex:0 0 45%;border-left:none;border-top:none;border-right:none;display:flex;min-height:0}
.main.craft-full .sidebar{display:none}
.main.craft-full .workspace{flex:1}
.main.inv-full .workspace{display:none}
.main.inv-full .sidebar{flex:1}
.header h1{font-size:.68em}
.hbtn{padding:2px 5px;font-size:.5em}
.craft-slot{width:44px;height:52px}
.craft-slot .se{font-size:1.05em}
.craft-slot .sn{font-size:.34em;max-width:38px}
.tool-slot{width:38px;height:44px}
.tool-slot .se{font-size:1em}
.tool-slot .sn{font-size:.32em;max-width:32px}
.pbtn{padding:1px 3px;font-size:.42em}
.temp-bar{height:28px}
.cbtn{padding:3px 12px;font-size:.62em}
.icard{min-height:40px}
.icard .ie{font-size:.95em}
.igrid{grid-template-columns:repeat(auto-fill,minmax(44px,1fr))}
}
.mob-tab{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);z-index:100;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}
.mob-tab button{flex:1;padding:8px 0;border:none;background:transparent;color:var(--text2);font-size:.7em;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;position:relative}
.mob-tab button.active{color:var(--gold)}
.mob-tab button.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--gold);border-radius:0 0 3px 3px}
.mob-tab button span:first-child{font-size:1.3em}
.mob-tab button .lbl{font-size:.85em}
.mob-tab button.active.full-mode::before{content:'⤢';position:absolute;top:-2px;right:2px;font-size:.8em;color:var(--gold)}
.tool-pick-m .mbox{max-width:320px}
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px}
.tp-item{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.tp-item:hover,.tp-item:active{border-color:var(--gold);background:rgba(255,215,0,.06)}
.tp-item .tp-e{font-size:1.8em}
.tp-item .tp-n{font-size:.6em;color:var(--text2);margin-top:2px}
.tp-empty{padding:10px;text-align:center;color:var(--text2);font-size:.8em}
</style>
</head>
<body>
<div class="header">
<h1>⚒️ 人类工具进化史</h1>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
<span class="progress-text" id="pt">0/0</span>

function renderCond(){

let conditions=[];
const proc=P[selProc];
if(proc.minT>0){
const ok=maxT()>=proc.minT;
conditions.push({met:ok,label:`🌡️ 温度≥${proc.minT}°C ${ok?'✓':'✗'}`});
}
if(proc.needElec){
const ok=hasElec();
conditions.push({met:ok,label:`⚡ 电力 ${ok?'✓':'✗'}`});
}
const matching=findRecipeNoReq(filled,selProc);
if(matching&&matching.need){
const ok=disc.has(matching.need);
conditions.push({met:ok,label:`🏗️ 需要${I[matching.need].n} ${ok?'✓':'(未发现)✗'}`});
}
if(matching&&matching.req){
const ok=disc.has(matching.req);
const inSlot=toolSlot===matching.req;
conditions.push({met:ok&&inSlot,label:`🔧 装备${I[matching.req].n} ${inSlot?'(已装备)✓':ok?'(已发现，请装备)':'(未发现)✗'}`});
}
cs.innerHTML=conditions.map(c=>`<span class="cond-tag ${c.met?'met':'unmet'}">${c.label}</span>`).join('');
}

function onToolDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain')||dragId;if(!id||!disc.has(id)||!I[id].tool)return;toolSlot=id;renderCraft();renderCond();updateHints();dragId=null}

function findRecipe(ing,proc,tool){
const s=[...ing].sort();
for(const r of R){
if(r.p!==proc)continue;
const rs=[...r.i].sort();
if(s.length!==rs.length)continue;
if(!s.every((v,i)=>v===rs[i]))continue;
if(r.need&&!disc.has(r.need))continue;
if(r.req&&tool!==r.req)continue;
return r;
}
return null;
}

function findRecipeNoReq(ing,proc){
const s=[...ing].sort();
for(const r of R){
if(r.p!==proc)continue;
const rs=[...r.i].sort();
if(s.length!==rs.length)continue;
if(!s.every((v,i)=>v===rs[i]))continue;
return r;
}
return null;
}

function findRecipeAnyProc(ing){
const s=[...ing].sort();
for(const r of R){
const rs=[...r.i].sort();
if(s.length!==rs.length)continue;
if(!s.every((v,i)=>v===rs[i]))continue;
return r;
}
return null;
}

function tryCombine(){
const ing=slots.filter(s=>s!==null);
if(ing.length===0)return;
const recipe=findRecipe(ing,selProc,toolSlot);
const ra=document.getElementById('ra');
if(recipe){
const it=I[recipe.r];
const isNew=!disc.has(recipe.r);
disc.add(recipe.r);
newI.add(recipe.r);
const era=ERAS[it.era];
ra.innerHTML=`<div class="result-item"><span class="re">${it.e}</span><span class="rn">${it.n}</span><span class="ra" style="background:${era.c}22;color:${era.c}">${era.i} ${era.n}</span></div>`;
if(isNew){showDisc(recipe.r);sparkle()}
slots=[null,null,null,null];toolSlot=null;
renderCraft();renderItems();renderFilter();renderProc();renderCond();updateTemp();updateProgress();updateHints();saveGame();
}else{
const hint=getHint(ing,selProc,toolSlot);
ra.innerHTML=`<div class="fail-text">${hint}</div>`;
}
}

function getHint(ing,proc,tool){
const s=[...ing].sort();
const rnt=findRecipeNoReq(ing,proc);
if(rnt&&rnt.need&&!disc.has(rnt.need))return `❌ 需要先发现: ${I[rnt.need].n}`;
if(rnt&&rnt.req&&tool!==rnt.req){
if(!disc.has(rnt.req))return `❌ 需要工具: ${I[rnt.req].n}（尚未发现）`;
return `❌ 请在工具位装备: ${I[rnt.req].n}`;
}
const rap=findRecipeAnyProc(ing);
if(rap&&rap.p!==proc)return `❌ 工艺不对！试试「${P[rap.p].n}」`;
if(rap&&rap.need&&!disc.has(rap.need))return `❌ 需要先发现: ${I[rap.need].n}`;
if(rap&&rap.req&&!disc.has(rap.req))return `❌ 需要先发现工具: ${I[rap.req].n}`;
for(const r of R){
if(r.p!==proc)continue;
const rC={};r.i.forEach(x=>{rC[x]=(rC[x]||0)+1});
const iC={};ing.forEach(x=>{iC[x]=(iC[x]||0)+1});
let sub=true;
for(const[k,v]of Object.entries(iC)){if(!rC[k]||rC[k]<v){sub=false;break}}
if(sub&&ing.length<r.i.length){
const t={...rC};ing.forEach(x=>{t[x]--});
const miss=[];for(const[k,v]of Object.entries(t)){for(let j=0;j<v;j++)miss.push(I[k].n)}
return `❌ 还缺少: ${miss.join('、')}`;
}
}
for(const r of R){
if(r.p!==proc)continue;
const rC={};r.i.forEach(x=>{rC[x]=(rC[x]||0)+1});
const iC={};ing.forEach(x=>{iC[x]=(iC[x]||0)+1});
let sup=true;
for(const[k,v]of Object.entries(rC)){if(!iC[k]||iC[k]<v){sup=false;break}}
if(sup&&ing.length>r.i.length)return `❌ 材料太多了，试试减少一些`;
}
return '❌ 这组材料无法合成';
}

function showDisc(id){
const it=I[id];const era=ERAS[it.era];
const recipe=R.find(r=>r.r===id);
let rs='';
if(recipe)rs=recipe.i.map(x=>I[x].e+I[x].n).join(' + ')+` [${P[recipe.p].n}]`;
let reqStr='';
if(recipe&&recipe.req)reqStr=`<div class="dreq">🔧 需要装备工具: ${I[recipe.req].n}</div>`;
if(recipe&&recipe.need)reqStr+=`<div class="dreq">🏗️ 需要已发现: ${I[recipe.need].n}</div>`;
document.getElementById('db').innerHTML=`<span class="de">${it.e}</span><div class="dn">${it.n}</div><span class="da" style="background:${era.c}22;color:${era.c}">${era.i} ${era.n}</span><div class="dd">${it.d}</div>${it.heat?`<div class="dd" style="color:var(--accent)">🔥 可达 ${it.maxT}°C 高温！</div>`:''}${it.tool?`<div class="dd" style="color:#60a0d0">🔧 可作为工具使用</div>`:''}<div class="dr">${rs}</div>${reqStr}`;
document.getElementById('dm').classList.add('show');
setTimeout(()=>cm('dm'),2800);
}

function cm(id){document.getElementById(id).classList.remove('show')}

function isMob(){return window.innerWidth<=768}

let mobViewMode='split';
function mobTab(tab){
const main=document.querySelector('.main');
const btns=document.querySelectorAll('#mtab button');
btns.forEach(b=>{b.classList.remove('active');b.classList.remove('full-mode')});
if(tab==='craft'){
if(mobViewMode==='craft-full'){mobViewMode='split';main.classList.remove('craft-full')}
else{mobViewMode='craft-full';main.classList.add('craft-full');main.classList.remove('inv-full');btns[0].classList.add('full-mode')}
btns[0].classList.add('active');
}else if(tab==='inv'){
if(mobViewMode==='inv-full'){mobViewMode='split';main.classList.remove('inv-full')}
else{mobViewMode='inv-full';main.classList.add('inv-full');main.classList.remove('craft-full');btns[1].classList.add('full-mode')}
btns[1].classList.add('active');
}else if(tab==='tree'){
showTree();btns[2].classList.add('active');
}else if(tab==='enc'){
showEnc();btns[3].classList.add('active');
}
}

function showToolPick(){
const tools=[...disc].filter(id=>I[id].tool);
const body=document.getElementById('tpb');
if(tools.length===0){
body.innerHTML='<div class="tp-empty">还没有发现任何工具<br>继续探索吧！</div>';
}else{
let h='<div class="tp-grid">';
h+=`<div class="tp-item" onclick="pickTool(null)"><span class="tp-e">❌</span><span class="tp-n">不使用</span></div>`;

const it=I[id];
h+=`<div class="tp-item${toolSlot===id?' style="border-color:var(--gold)"':''}" onclick="pickTool('${id}')"><span class="tp-e">${it.e}</span><span class="tp-n">${it.n}</span></div>`;
});
h+='</div>';body.innerHTML=h;
}

}

function pickTool(id){
toolSlot=id;cm('tpm');renderCraft();renderCond();updateHints();
}

function sparkle(){
const a=document.querySelector('.craft-area');const r=a.getBoundingClientRect();
const cx=r.left+r.width/2,cy=r.top+r.height/2;
for(let i=0;i<14;i++){

function updateProgress(){
const cnt=disc.size;const pct=(cnt/TOTAL*100).toFixed(1);
document.getElementById('pf').style.width=pct+'%';
document.getElementById('pt').textContent=`${cnt}/${TOTAL}`;
const ce=getCurEra();const badge=document.getElementById('eb');const ei=ERAS[ce];
badge.textContent=`${ei.i} ${ei.n}`;badge.style.borderColor=ei.c;badge.style.color=ei.c;badge.style.background=ei.c+'18';
}

function getCurEra(){let mx=0;disc.forEach(id=>{const idx=EO.indexOf(I[id].era);if(idx>mx)mx=idx});return EO[mx]}

function updateHints(){
const found=disc.size;const remain=TOTAL-found;
const possible=R.filter(r=>{
if(disc.has(r.r))return false;
if(!r.i.every(x=>disc.has(x)))return false;
if(!procAvail(r.p))return false;
if(r.req&&!disc.has(r.req))return false;
if(r.need&&!disc.has(r.need))return false;
return true;
}).length;
document.getElementById('sh').innerHTML=`已发现 <b>${found}</b>/${TOTAL}，剩余 <b>${remain}</b><br>当前可合成: <b>${possible}</b> 种`;
const filled=slots.filter(s=>s!==null);
const wh=document.getElementById('wh');
if(filled.length===0){
const hints=[];
if(!disc.has('fire'))hints.push('💡 试试用燧石碰撞石头产生火花…');
else if(!disc.has('campfire'))hints.push('💡 把火和石头组合，可以搭建营火');
else if(!disc.has('charcoal')&&!disc.has('ash'))hints.push('💡 试试用烧制工艺处理木头');
else if(!disc.has('salt'))hints.push('💡 海水晒干能得到什么？试试烧制海水');
else if(!disc.has('wheat'))hints.push('💡 种子+淡水可以种出小麦，试试发酵工艺');
else if(!disc.has('pottery'))hints.push('💡 陶土需要用烧制工艺才能变成陶器');
else if(!disc.has('copper_ore'))hints.push('💡 用石锤敲击石头，也许能找到矿石');
else if(!disc.has('kiln'))hints.push('💡 三个砖可以搭建窑炉，获得更高温度');
else if(!disc.has('copper'))hints.push('💡 铜矿石+木炭，用冶炼工艺提取铜');
else if(!disc.has('bronze'))hints.push('💡 铜和锡的合金就是青铜');
else if(!disc.has('iron'))hints.push('💡 铁矿石需要更高温度，先造锻炉');
else if(!disc.has('steel'))hints.push('💡 铁和木炭一起锻造，可以得到钢');
else if(!disc.has('microscope'))hints.push('💡 透镜组合可以制作显微镜，窥探微观世界');
else if(!disc.has('electricity'))hints.push('💡 磁铁+金属丝→发电机，蒸汽机驱动');
else if(!disc.has('ammonia'))hints.push('💡 电力+淡水+空气→合成氨，化工之母');
else if(!disc.has('chip'))hints.push('💡 沙子电解得到纯硅，再光刻成芯片');
else if(!disc.has('dna'))hints.push('💡 细胞+显微镜→DNA，生命的密码');
else if(!disc.has('gene'))hints.push('💡 DNA+酶→基因，用基因工程改造生命');
else if(!disc.has('nuclear_reactor'))hints.push('💡 放射性+混凝土+钢→核反应堆');
else if(!disc.has('qubit'))hints.push('💡 超导体+芯片→量子比特，量子时代开启');
else if(!disc.has('quantum_computer'))hints.push('💡 量子比特组合→量子计算机');
else if(!disc.has('fusion_reactor'))hints.push('💡 核反应堆+氢→聚变等离子体→聚变反应堆');
if(possible>0)hints.push(`🎯 当前有 ${possible} 种可合成，试试已有材料的组合！`);
if(hints.length>0)wh.textContent=hints[0];
else wh.textContent=isMob()?'👇 切换到「物品」标签选择材料':'👇 点击材料放入合成台';
}else{
const matching=R.filter(r=>{
if(disc.has(r.r))return false;
const inSlots=filled.filter(x=>r.i.includes(x));
return inSlots.length>0&&inSlots.length<r.i.length;
});
if(matching.length>0){
const r=matching[0];
const missing=r.i.filter(x=>!filled.includes(x));
const mNames=missing.map(x=>I[x].n).join('、');
wh.textContent=`💡 还需要: ${mNames}，工艺: ${P[r.p].n}`;
}else{
wh.textContent=`已放入 ${filled.length} 种材料，选择工艺后合成`;
}
}
}

function showTree(){document.getElementById('tm').classList.add('show');renderTree()}

function renderTree(){
const con=document.getElementById('tcon');con.innerHTML='';
const ei={};EO.forEach(e=>{ei[e]=[]});
Object.entries(I).forEach(([id,it])=>{ei[it.era].push(id)});
const nW=68,nH=50,eGap=90,hGap=14,eLH=24;
const ns='http://www.w3.org/2000/svg';const pos={};
let mxC=0;EO.forEach(e=>{if(ei[e].length>mxC)mxC=ei[e].length});
const tW=mxC*(nW+hGap)+80;const tH=EO.length*(nH+eGap)+80;
const inner=document.createElement('div');inner.className='tc-inner';inner.style.width=tW+'px';inner.style.height=tH+'px';
const svg=document.createElementNS(ns,'svg');svg.setAttribute('width',tW);svg.setAttribute('height',tH);svg.style.width=tW+'px';svg.style.height=tH+'px';
EO.forEach((era,ri)=>{
const items=ei[era];const y=ri*(nH+eGap)+eLH+30;
const rw=items.length*(nW+hGap)-hGap;const sx=(tW-rw)/2;
items.forEach((id,ci)=>{pos[id]={x:sx+ci*(nW+hGap)+nW/2,y:y+nH/2,px:sx+ci*(nW+hGap),py:y}});
});
R.forEach(r=>{
r.i.forEach(fid=>{
if(!pos[fid]||!pos[r.r])return;
const f=pos[fid],t=pos[r.r];
const line=document.createElementNS(ns,'line');
line.setAttribute('x1',f.x);line.setAttribute('y1',f.y);line.setAttribute('x2',t.x);line.setAttribute('y2',t.y);
const d=disc.has(fid)&&disc.has(r.r);
line.setAttribute('stroke',d?ERAS[I[r.r].era].c+'50':'#ffffff08');
line.setAttribute('stroke-width',d?'2':'1');
if(d){line.style.strokeDasharray='2000';line.style.strokeDashoffset='2000';line.style.animation='drawLine 1s ease forwards'}
svg.appendChild(line);
});
});
EO.forEach((era,ri)=>{
const y=ri*(nH+eGap)+12;
const label=document.createElement('div');label.className='tl';label.style.top=y+'px';label.style.color=ERAS[era].c;
label.textContent=`${ERAS[era].i} ${ERAS[era].n}`;inner.appendChild(label);
});
Object.entries(I).forEach(([id,it])=>{
if(!pos[id])return;const p=pos[id];const d=disc.has(id);
const node=document.createElement('div');
node.className=`tn${d?' disc':' undisc'}`;node.style.left=p.px+'px';node.style.top=p.py+'px';
node.style.borderColor=d?ERAS[it.era].c:'';
node.innerHTML=`<span class="te">${d?it.e:'❓'}</span><span class="tt">${d?it.n:'???'}</span>`;
if(d)node.onclick=()=>{
const recipe=R.find(r=>r.r===id);
let info=`${it.e} ${it.n}\n${it.d}`;
if(it.heat)info+=`\n🔥 热源: ${it.maxT}°C`;
if(it.tool)info+=`\n🔧 可作为工具使用`;
if(recipe)info+=`\n配方: ${recipe.i.map(x=>I[x].n).join('+')} [${P[recipe.p].n}]${recipe.req?' 装备:'+I[recipe.req].n:''}${recipe.need?' 需要:'+I[recipe.need].n:''}`;
alert(info);
};
inner.appendChild(node);
});
inner.appendChild(svg);svg.style.zIndex='1';
con.appendChild(inner);
const zoomCtrl=document.createElement('div');zoomCtrl.className='tc-zoom';
const zoomIn=document.createElement('button');zoomIn.textContent='+';zoomIn.title='放大';
const zoomLabel=document.createElement('div');zoomLabel.className='zlabel';zoomLabel.textContent='100%';
const zoomOut=document.createElement('button');zoomOut.textContent='−';zoomOut.title='缩小';
const zoomFit=document.createElement('button');zoomFit.textContent='⊡';zoomFit.title='适应屏幕';
zoomCtrl.append(zoomIn,zoomLabel,zoomOut,zoomFit);con.appendChild(zoomCtrl);
const mmDiv=document.createElement('div');mmDiv.className='tc-minimap';
const mmCanvas=document.createElement('canvas');mmCanvas.width=240;mmCanvas.height=160;mmDiv.appendChild(mmCanvas);
const vpDiv=document.createElement('div');vpDiv.className='tc-vp';mmDiv.appendChild(vpDiv);
con.appendChild(mmDiv);
let scale=1,panX=0,panY=0;
function applyTransform(){
inner.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
zoomLabel.textContent=Math.round(scale*100)+'%';
updateMinimap();
}
function fitToScreen(){
const cw=con.clientWidth,ch=con.clientHeight;
const s=Math.min(cw/tW,ch/tH)*0.92;
scale=s;panX=(cw-tW*s)/2;panY=(ch-tH*s)/2;
applyTransform();
}
function zoomAt(ds,cx,cy){
const ns2=Math.max(0.15,Math.min(3,scale*ds));
const r=ns2/scale;
panX=cx-(cx-panX)*r;panY=cy-(cy-panY)*r;
scale=ns2;applyTransform();
}
zoomIn.onclick=()=>zoomAt(1.3,con.clientWidth/2,con.clientHeight/2);
zoomOut.onclick=()=>zoomAt(0.7,con.clientWidth/2,con.clientHeight/2);
zoomFit.onclick=fitToScreen;
let drag=false,dsx,dsy,dpx,dpy;
con.onmousedown=e=>{if(e.target.closest('.tc-zoom'))return;drag=true;dsx=e.clientX;dsy=e.clientY;dpx=panX;dpy=panY;e.preventDefault()};
window.addEventListener('mousemove',e=>{if(!drag)return;panX=dpx+(e.clientX-dsx);panY=dpy+(e.clientY-dsy);applyTransform()});
window.addEventListener('mouseup',()=>drag=false);
con.addEventListener('wheel',e=>{e.preventDefault();const r=con.getBoundingClientRect();const cx=e.clientX-r.left,cy=e.clientY-r.top;zoomAt(e.deltaY<0?1.12:0.88,cx,cy)},{passive:false});
let touches={};
con.ontouchstart=e=>{if(e.target.closest('.tc-zoom'))return;e.preventDefault();for(const t of e.changedTouches)touches[t.identifier]={x:t.clientX,y:t.clientY}};
con.ontouchmove=e=>{e.preventDefault();const ids=Object.keys(touches);if(e.touches.length===1&&ids.length>=1){
const t=e.touches[0],o=touches[ids[0]];if(!o)return;
panX+=t.clientX-o.x;panY+=t.clientY-o.y;touches[ids[0]]={x:t.clientX,y:t.clientY};applyTransform();
}else if(e.touches.length===2&&ids.length>=2){
const t1=e.touches[0],t2=e.touches[1];
const o1=touches[ids[0]],o2=touches[ids[1]];if(!o1||!o2)return;
const od=Math.hypot(o2.x-o1.x,o2.y-o1.y);
const nd=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
const cx=(t1.clientX+t2.clientX)/2-con.getBoundingClientRect().left;
const cy=(t1.clientY+t2.clientY)/2-con.getBoundingClientRect().top;
zoomAt(nd/od,cx,cy);
touches[t1.identifier]={x:t1.clientX,y:t1.clientY};
touches[t2.identifier]={x:t2.clientX,y:t2.clientY};
}};
con.ontouchend=e=>{for(const t of e.changedTouches)delete touches[t.identifier]};
function updateMinimap(){
const ctx=mmCanvas.getContext('2d');ctx.clearRect(0,0,240,160);
const sx=240/tW,sy=160/tH,ms=Math.min(sx,sy)*0.9;
const ox=(240-tW*ms)/2,oy=(160-tH*ms)/2;
ctx.fillStyle='#0a0a2a';ctx.fillRect(0,0,240,160);
EO.forEach((era,ri)=>{
const y=ri*(nH+eGap)+eLH+30;
ctx.fillStyle=ERAS[era].c+'30';ctx.fillRect(ox,oy+y*ms,tW*ms,(nH+eGap)*ms);
ctx.fillStyle=ERAS[era].c+'80';ctx.font='8px sans-serif';ctx.fillText(ERAS[era].n,ox+2,oy+y*ms-2);
});
ei['stone'].length&&Object.entries(I).forEach(([id,it])=>{
if(!pos[id])return;const p=pos[id];const d=disc.has(id);
ctx.fillStyle=d?ERAS[it.era].c:'#333';
ctx.fillRect(ox+p.px*ms,oy+p.py*ms,Math.max(2,nW*ms),Math.max(2,nH*ms));
});
const cw=con.clientWidth,ch=con.clientHeight;
const vx=(-panX/scale)*ms+ox,vy=(-panY/scale)*ms+oy;
const vw=(cw/scale)*ms,vh=(ch/scale)*ms;
vpDiv.style.left=(vx/240*100)+'%';vpDiv.style.top=(vy/160*100)+'%';
vpDiv.style.width=(vw/240*100)+'%';vpDiv.style.height=(vh/160*100)+'%';
}
fitToScreen();
}

function showEnc(){document.getElementById('em').classList.add('show');renderEnc()}

function renderEnc(){
const body=document.getElementById('eb2');
let h='<div class="egrid">';
const sorted=[...disc].sort((a,b)=>{const ea=EO.indexOf(I[a].era),eb=EO.indexOf(I[b].era);return ea!==eb?ea-eb:a.localeCompare(b)});
sorted.forEach(id=>{
const it=I[id];const era=ERAS[it.era];
const recipe=R.find(r=>r.r===id);
let rs='';
if(recipe)rs=`${recipe.i.map(x=>I[x].e).join('+')} → ${P[recipe.p].i}${P[recipe.p].n}${recipe.req?' (装备'+I[recipe.req].n+')':''}${recipe.need?' (需'+I[recipe.need].n+')':''}`;
h+=`<div class="ecard"><span class="ee">${it.e}</span><div class="ei"><div class="en">${it.n}</div><span class="ea" style="background:${era.c}22;color:${era.c}">${era.i} ${era.n}</span><div class="ed">${it.d}</div>${it.heat?`<div class="ed" style="color:var(--accent)">🔥 ${it.maxT}°C</div>`:''}${it.tool?`<div class="ed" style="color:#60a0d0">🔧 工具</div>`:''}${rs?`<div class="er">${rs}</div>`:'<div class="er">基础元素</div>'}</div></div>`;
});
h+='</div>';body.innerHTML=h;
}

function saveGame(){
try{localStorage.setItem('tev3',JSON.stringify([...disc]))}catch(e){}
saveToServer();
}
function loadGame(){
try{const s=localStorage.getItem('tev3');if(s){const a=JSON.parse(s);if(a.length>0)disc=new Set(a)}}catch(e){}
loadFromServer();
}
async function saveToServer(){
const t=localStorage.getItem('token');
if(!t)return;
try{await fetch('/api/progress/simple',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({discovered:[...disc]})})}catch(e){}
}
async function loadFromServer(){
try{const s=localStorage.getItem('tev3');if(s){const a=JSON.parse(s);if(a.length>0)disc=new Set(a)}}catch(e){}
const t=localStorage.getItem('token');
if(!t)return;
try{const res=await fetch('/api/progress/simple',{headers:{'Authorization':'Bearer '+t}});const r=await res.json();
if(r.ok&&r.discovered&&r.discovered.length>0){disc=new Set(r.discovered);localStorage.setItem('tev3',JSON.stringify([...disc]))}}catch(e){}
}
function resetGame(){
if(!confirm('确定重置？所有进度将丢失！'))return;
disc=new Set(BASE);slots=[null,null,null,null];toolSlot=null;selProc='handcraft';curFilter='all';
clearAll();renderProc();renderCond();renderFilter();renderItems();updateTemp();updateProgress();updateHints();
localStorage.removeItem('tev3');saveToServer();
}

async function initAsync(){await loadFromServer();renderCraft();renderItems();renderFilter();renderProc();renderCond();updateTemp();updateProgress();updateHints()}
init();initAsync();
document.addEventListener('touchmove',function(e){},{passive:true});

</script>
