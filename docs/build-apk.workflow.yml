name: Build Android APK

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp standalone.html www/index.html
          cp simple.html realistic.html manifest.json sw.js icon-192.png icon-512.png www/

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             human-tool-evolution-${{ github.event.release.tag_name || 'latest' }}.apk
          mv android/app/build/outputs/bundle/debug/app-debug.aab \
             human-tool-evolution-${{ github.event.release.tag_name || 'latest' }}.aab || true

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
            *.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: human-tool-evolution-apk
          path: |
            *.apk
            *.aab
