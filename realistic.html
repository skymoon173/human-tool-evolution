<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>万物说明书 - 人类工具进化史</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;overscroll-behavior:none}
body{height:100%;overflow:hidden}
:root{--bg:#060614;--bg2:#0a0a22;--card:#121238;--card2:#1a1a48;--accent:#20b2aa;--accent2:#e94560;--gold:#ffd700;--text:#d8d8f0;--text2:#6868a0;--ok:#4ecca3;--border:#222250;--chem:#20b2aa}
@keyframes discoverPop{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.25) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) translate(0,0)}50%{opacity:1;transform:scale(1) translate(var(--tx),var(--ty))}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes glow{0%,100%{text-shadow:0 0 4px var(--chem)}50%{text-shadow:0 0 12px var(--chem)}}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;user-select:none;-webkit-user-select:none}
.header{background:linear-gradient(135deg,var(--bg2),var(--card));padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.header h1{font-size:1.1em;background:linear-gradient(135deg,var(--chem),var(--ok));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;white-space:nowrap}
.progress-wrap{display:flex;align-items:center;gap:6px;flex:1;max-width:260px;min-width:100px}
.progress-bar{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--chem),var(--gold));border-radius:4px;transition:width .5s}
.progress-text{font-size:.7em;color:var(--text2);white-space:nowrap}
.era-badge{padding:2px 10px;border-radius:12px;font-size:.7em;font-weight:bold;border:2px solid;white-space:nowrap;transition:all .5s}
.hbtn{padding:4px 10px;border-radius:7px;font-size:.7em;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .3s;white-space:nowrap}
.hbtn:hover{border-color:var(--chem);color:var(--chem)}
.main{display:flex;height:calc(100vh - 46px);height:calc(100dvh - 46px);overflow:hidden}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 12px;position:relative;background:radial-gradient(ellipse at center,#08081e 0%,var(--bg) 70%);overflow-y:auto;gap:6px}
.ws-hint{color:var(--text2);font-size:.78em;text-align:center}
.craft-area{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;min-height:80px}
.craft-slot{width:76px;height:90px;border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.01);position:relative}
.craft-slot:hover{border-color:var(--chem);background:rgba(32,178,170,.04)}
.craft-slot.drag-over{border-color:var(--gold);background:rgba(255,215,0,.06);transform:scale(1.03)}
.craft-slot.filled{border-style:solid;border-color:var(--chem);background:rgba(32,178,170,.05);animation:float 2.5s ease-in-out infinite}
.craft-slot .se{font-size:1.8em;line-height:1}
.craft-slot .sn{font-size:.55em;color:var(--text2);margin-top:1px;text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.craft-slot .sc{font-size:.42em;color:var(--chem);margin-top:0;opacity:.7}
.craft-slot .sx{position:absolute;top:1px;right:2px;font-size:.6em;color:var(--accent2);cursor:pointer;opacity:0;transition:opacity .2s}
.craft-slot:hover .sx{opacity:1}
.craft-plus{font-size:1.3em;color:var(--text2);font-weight:bold}
.tool-slot-wrap{display:flex;align-items:center;gap:6px;margin-top:2px}
.tool-slot{width:58px;height:66px;border:2px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;background:rgba(100,200,255,.02);position:relative}
.tool-slot:hover{border-color:#60a0d0}
.tool-slot.filled{border-style:solid;border-color:#60a0d0;background:rgba(100,200,255,.05)}
.tool-slot .se{font-size:1.4em;line-height:1}
.tool-slot .sn{font-size:.5em;color:var(--text2);margin-top:1px;text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-slot .sx{position:absolute;top:1px;right:1px;font-size:.55em;color:var(--accent2);cursor:pointer;opacity:0;transition:opacity .2s}
.tool-slot:hover .sx{opacity:1}
.tool-label{font-size:.65em;color:var(--text2)}
.process-section{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;max-width:560px}
.process-row{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.pbtn{padding:4px 8px;border-radius:6px;font-size:.62em;border:2px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:2px;white-space:nowrap}
.pbtn:hover:not(.locked){border-color:var(--chem);color:var(--chem)}
.pbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.06);box-shadow:0 0 6px rgba(255,215,0,.12)}
.pbtn.locked{opacity:.25;cursor:not-allowed}
.pbtn .pi{font-size:1em}
.pbtn .pt{font-size:.75em;opacity:.5}
.cond-section{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center;width:100%;max-width:560px}
.cond-tag{padding:2px 7px;border-radius:5px;font-size:.6em;border:1px solid var(--border);background:var(--card);color:var(--text2);display:flex;align-items:center;gap:2px}
.cond-tag.met{border-color:var(--ok);color:var(--ok)}
.cond-tag.unmet{border-color:var(--accent2);color:var(--accent2);opacity:.6}
.temp-section{display:flex;align-items:center;gap:8px}
.temp-bar{width:16px;height:55px;background:var(--bg);border-radius:8px;border:1px solid var(--border);position:relative;overflow:hidden}
.temp-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 8px 8px;transition:height .5s,background .5s}
.temp-info{font-size:.65em;color:var(--text2);line-height:1.4}
.temp-info b{color:var(--chem)}
.action-row{display:flex;gap:6px;align-items:center}
.cbtn{padding:7px 26px;font-size:.9em;font-weight:bold;border:none;border-radius:8px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.cbtn.active{background:linear-gradient(135deg,var(--chem),#188880);color:#fff;box-shadow:0 3px 10px rgba(32,178,170,.3)}
.cbtn.active:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(32,178,170,.4)}
.cbtn.disabled{background:var(--border);color:var(--text2);cursor:not-allowed}
.clrbtn{padding:5px 12px;font-size:.7em;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;transition:all .3s}
.clrbtn:hover{border-color:var(--accent2);color:var(--accent2)}
.result-area{min-height:55px;display:flex;align-items:center;justify-content:center}
.result-item{animation:discoverPop .6s ease-out;display:flex;flex-direction:column;align-items:center;gap:2px}
.result-item .re{font-size:2.4em}
.result-item .rn{font-size:.9em;font-weight:bold;color:var(--gold)}
.result-item .rc{font-size:.6em;color:var(--chem);animation:glow 2s ease-in-out infinite}
.result-item .ra{font-size:.6em;padding:1px 6px;border-radius:7px}
.fail-text{color:var(--accent2);font-size:.8em;animation:shake .4s ease}
.sidebar{width:270px;background:var(--bg2);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-head h2{font-size:.85em;color:var(--gold)}
.filter-row{display:flex;gap:2px;flex-wrap:wrap;padding:4px 6px;border-bottom:1px solid var(--border)}
.fbtn{padding:2px 5px;font-size:.6em;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .3s;white-space:nowrap}
.fbtn:hover,.fbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.05)}
.igrid{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:4px;align-content:start}
.igrid::-webkit-scrollbar{width:3px}
.igrid::-webkit-scrollbar-track{background:var(--bg)}
.igrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.icard{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;border-radius:7px;border:2px solid var(--border);background:var(--card);cursor:grab;transition:all .25s;min-height:62px}
.icard:hover{border-color:var(--chem);transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.4)}
.icard:active{cursor:grabbing;transform:scale(.95)}
.icard .ie{font-size:1.4em;line-height:1}
.icard .iname{font-size:.5em;color:var(--text2);text-align:center;margin-top:1px;line-height:1.2;max-width:54px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.icard .ichem{font-size:.38em;color:var(--chem);opacity:.7;margin-top:0}
.icard.newi{animation:discoverPop .5s ease-out}
.sb-hint{padding:6px 10px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.sb-hint h3{font-size:.65em;color:var(--chem);margin-bottom:2px}
.sb-hint p{font-size:.6em;color:var(--text2);line-height:1.4}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.mbox{background:var(--bg2);border:2px solid var(--border);border-radius:12px;max-width:90vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.mhead{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h2{font-size:.95em;color:var(--gold)}
.mclose{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:1em;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.mclose:hover{border-color:var(--accent2);color:var(--accent2)}
.mbody{flex:1;overflow:auto;padding:14px}
.disc-m .mbox{max-width:380px;text-align:center}
.de{font-size:3.2em;display:block;margin:6px 0;animation:discoverPop .6s ease-out}
.dn{font-size:1.3em;font-weight:bold;color:var(--gold);margin-bottom:2px}
.dc{font-size:.85em;color:var(--chem);margin-bottom:4px;font-family:'Courier New',monospace;animation:glow 2s ease-in-out infinite}
.da{display:inline-block;padding:2px 10px;border-radius:9px;font-size:.75em;margin-bottom:4px}
.dd{color:var(--text2);font-size:.8em;margin-bottom:3px;line-height:1.4}
.dprop{font-size:.65em;color:var(--text2);background:var(--card);padding:4px 8px;border-radius:5px;display:inline-block;margin:2px}
.dprop b{color:var(--chem)}
.dr{font-size:.65em;color:var(--text2);background:var(--card);padding:4px 8px;border-radius:5px;display:inline-block;margin-top:2px}
.dreq{font-size:.65em;color:var(--accent);margin-top:2px}
.tree-m .mbox{width:95vw;max-width:1500px;height:85vh}
.tc{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab;touch-action:none}
.tc:active{cursor:grabbing}
.tc-inner{position:absolute;transform-origin:0 0;will-change:transform}
.tc svg{position:absolute;top:0;left:0;pointer-events:none}
.tc-zoom{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10}
.tc-zoom button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tc-zoom button:hover{background:var(--card2);border-color:var(--gold)}
.tc-zoom .zlabel{font-size:.55em;text-align:center;color:var(--text2);padding:2px 0}
.tc-minimap{position:absolute;bottom:12px;left:12px;width:120px;height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:10;opacity:.7}
.tc-minimap:hover{opacity:1}
.tc-minimap canvas{width:100%;height:100%}
.tc-vp{position:absolute;border:1.5px solid var(--gold);border-radius:2px;pointer-events:none}
.tn{position:absolute;width:62px;display:flex;flex-direction:column;align-items:center;padding:2px 1px;border-radius:6px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .3s;z-index:2}
.tn:hover{border-color:var(--gold);transform:scale(1.08);z-index:3}
.tn.disc{border-color:var(--chem)}
.tn.undisc{opacity:.2;filter:grayscale(1)}
.tn .te{font-size:1.2em;line-height:1}
.tn .tt{font-size:.4em;color:var(--text2);text-align:center;margin-top:1px;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl{position:absolute;left:0;width:100%;text-align:center;font-size:.6em;color:var(--text2);opacity:.4;pointer-events:none}
.enc-m .mbox{width:92vw;max-width:900px;height:82vh}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;display:flex;gap:8px;align-items:flex-start}
.ecard .ee{font-size:1.6em;flex-shrink:0}
.ecard .ei{flex:1;min-width:0}
.ecard .en{font-size:.8em;font-weight:bold;color:var(--gold)}
.ecard .ec{font-size:.65em;color:var(--chem);font-family:'Courier New',monospace}
.ecard .ea{font-size:.55em;padding:1px 4px;border-radius:5px;display:inline-block;margin:1px 0}
.ecard .ed{font-size:.6em;color:var(--text2);line-height:1.3}
.ecard .eprop{font-size:.5em;color:var(--text2);margin-top:2px}
.ecard .eprop b{color:var(--chem)}
.ecard .er{font-size:.5em;color:var(--text2);margin-top:2px;opacity:.6}
.tool-pick-m .mbox{max-width:340px}
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:5px}
.tp-item{display:flex;flex-direction:column;align-items:center;padding:6px 3px;border-radius:7px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.tp-item:hover,.tp-item:active{border-color:var(--gold);background:rgba(255,215,0,.05)}
.tp-item .tp-e{font-size:1.6em}
.tp-item .tp-n{font-size:.55em;color:var(--text2);margin-top:1px}
.tp-empty{padding:8px;text-align:center;color:var(--text2);font-size:.75em}
@media(max-width:768px){
body{padding-bottom:env(safe-area-inset-bottom)}
.header{padding:3px 6px;gap:2px;padding-top:calc(3px + env(safe-area-inset-top,0px))}
.header h1{font-size:.7em}
.hbtn{padding:2px 5px;font-size:.5em}
.progress-wrap{gap:3px;min-width:70px}
.progress-bar{height:5px}
.progress-text{font-size:.55em}
.era-badge{padding:1px 6px;font-size:.5em}
.main{flex-direction:column;height:calc(100vh - 34px - env(safe-area-inset-top,0px) - 44px);height:calc(100dvh - 34px - env(safe-area-inset-top,0px) - 44px)}
.workspace{min-height:0;flex:1;padding:3px 5px;gap:3px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.sidebar{width:100%;flex:1;border-left:none;border-top:2px solid var(--border);display:none}
.sidebar.mob-show{display:flex}
.craft-area{gap:3px;min-height:55px}
.craft-slot{width:50px;height:60px;border-radius:7px}
.craft-slot .se{font-size:1.2em}
.craft-slot .sn{font-size:.4em;max-width:44px}
.craft-slot .sc{font-size:.32em}
.craft-slot .sx{opacity:1;font-size:.65em;right:1px;top:0}
.craft-plus{font-size:.9em}
.tool-slot-wrap{gap:3px;margin-top:1px}
.tool-slot{width:44px;height:50px;border-radius:6px}
.tool-slot .se{font-size:1.1em}
.tool-slot .sn{font-size:.38em;max-width:38px}
.tool-slot .sx{opacity:1;font-size:.55em}
.tool-label{font-size:.48em}
.process-section{gap:2px}
.process-row{gap:1px}
.pbtn{padding:2px 4px;font-size:.42em;border-radius:4px}
.cond-section{gap:2px}
.cond-tag{font-size:.4em;padding:1px 4px}
.temp-section{gap:3px}
.temp-bar{width:10px;height:35px}
.temp-info{font-size:.45em;line-height:1.2}
.action-row{gap:3px}
.cbtn{padding:4px 14px;font-size:.7em;border-radius:6px}
.clrbtn{padding:2px 6px;font-size:.48em}
.result-area{min-height:35px}
.result-item .re{font-size:1.8em}
.result-item .rn{font-size:.65em}
.ws-hint{font-size:.55em}
.igrid{grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:2px;padding:3px}
.icard{min-height:46px;padding:2px 1px;border-radius:5px}
.icard .ie{font-size:1.1em}
.icard .iname{font-size:.38em}
.icard .ichem{font-size:.28em}
.sb-head{padding:3px 6px}
.sb-head h2{font-size:.65em}
.filter-row{padding:2px 3px;gap:1px}
.fbtn{padding:1px 3px;font-size:.42em}
.sb-hint{padding:3px 6px}
.sb-hint h3{font-size:.48em}
.sb-hint p{font-size:.42em}
.mob-tab{display:flex}
.egrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.ecard .ee{font-size:1.2em}
.ecard .en{font-size:.65em}
.ecard .ed{font-size:.45em}
.ecard .er{font-size:.35em}
.mbox{max-width:95vw;max-height:85vh;border-radius:10px}
.mhead{padding:5px 8px}
.mhead h2{font-size:.7em}
.mbody{padding:6px}
.de{font-size:2.5em}
.dn{font-size:1em}
.da{font-size:.65em}
.dd{font-size:.7em}
.dr{font-size:.55em}
.dreq{font-size:.55em}
}
.mob-tab{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);z-index:100;padding:3px 0;padding-bottom:env(safe-area-inset-bottom)}
.mob-tab button{flex:1;padding:6px 0;border:none;background:transparent;color:var(--text2);font-size:.65em;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.mob-tab button.active{color:var(--gold)}
.mob-tab button span{font-size:1.2em}
</style>
</head>
<body>
<div class="header">
<h1>🔬 万物说明书</h1>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
<span class="progress-text" id="pt">0/0</span>
</div>
<div class="era-badge" id="eb">🌍 原始</div>
<button class="hbtn" onclick="showTree()">🌳 科技树</button>
<button class="hbtn" onclick="showEnc()">📖 图鉴</button>
<button class="hbtn" onclick="resetGame()">🔄 重置</button>
</div>
<div class="main">
<div class="workspace">
<div class="ws-hint" id="wh">👇 点击材料放入合成台</div>
<div class="craft-area" id="ca"></div>
<div class="tool-slot-wrap">
<span class="tool-label">🔧 工具:</span>
<div class="tool-slot" id="ts" onclick="showToolPick()" ondragover="onDragOver(event)" ondrop="onToolDrop(event)" ondragleave="onDragLeave(event)">
<span class="se" style="opacity:.2">🔧</span>
<span class="sn" style="opacity:.25">工具位</span>
</div>
<span class="tool-label" style="font-size:.55em;color:var(--text2)">(点击选择，不消耗)</span>
</div>
<div class="process-section">
<div class="process-row" id="pr"></div>
<div class="cond-section" id="cs"></div>
<div class="temp-section">
<div class="temp-bar"><div class="temp-fill" id="tf"></div></div>
<div class="temp-info" id="ti">最高温度: --</div>
</div>
</div>
<div class="action-row">
<button class="cbtn disabled" id="cb" onclick="tryCombine()">⚗️ 合成</button>
<button class="clrbtn" onclick="clearAll()">清空</button>

function renderProc(){const row=document.getElementById('pr');let h='';Object.entries(P).forEach(([id,p])=>{const av=procAvail(id);const ac=selProc===id;h+=`<button class="pbtn${ac?' active':''}${av?'':' locked'}" onclick="selProcFn('${id}')" ${av?'':'title="需要更高级热源或电力"'}><span class="pi">${p.i}</span>${p.n}${p.minT>0?`<span class="pt">${p.minT}°C</span>`:''}</button>`});row.innerHTML=h}
function selProcFn(id){if(!procAvail(id))return;selProc=id;renderProc();renderCond();updateTemp();updateHints()}
function renderCond(){
const cs=document.getElementById('cs');const filled=slots.filter(s=>s!==null);let conditions=[];const proc=P[selProc];
if(proc.minT>0){const ok=maxT()>=proc.minT;conditions.push({met:ok,label:`🌡️ ≥${proc.minT}°C ${ok?'✓':'✗'} (实际${proc.realT})`})}
if(proc.needElec){const ok=hasElec();conditions.push({met:ok,label:`⚡ 电力 ${ok?'✓':'✗'}`})}
const matching=findRecipeNoReq(filled,selProc);
if(matching&&matching.need){const ok=disc.has(matching.need);conditions.push({met:ok,label:`🏗️ 需要${I[matching.need].n} ${ok?'✓':'(未发现)✗'}`})}
if(matching&&matching.req){const ok=disc.has(matching.req);const inSlot=toolSlot===matching.req;conditions.push({met:ok&&inSlot,label:`🔧 装备${I[matching.req].n} ${inSlot?'(已装备)✓':ok?'(已发现，请装备)':'(未发现)✗'}`})}
cs.innerHTML=conditions.map(c=>`<span class="cond-tag ${c.met?'met':'unmet'}">${c.label}</span>`).join('');
}

con.ontouchmove=e=>{e.preventDefault();const ids=Object.keys(touches);if(e.touches.length===1&&ids.length>=1){const t=e.touches[0],o=touches[ids[0]];if(!o)return;panX+=t.clientX-o.x;panY+=t.clientY-o.y;touches[ids[0]]={x:t.clientX,y:t.clientY};applyTransform()}else if(e.touches.length===2&&ids.length>=2){const t1=e.touches[0],t2=e.touches[1];const o1=touches[ids[0]],o2=touches[ids[1]];if(!o1||!o2)return;const od=Math.hypot(o2.x-o1.x,o2.y-o1.y);const nd=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);const cx=(t1.clientX+t2.clientX)/2-con.getBoundingClientRect().left;const cy=(t1.clientY+t2.clientY)/2-con.getBoundingClientRect().top;zoomAt(nd/od,cx,cy);touches[t1.identifier]={x:t1.clientX,y:t1.clientY};touches[t2.identifier]={x:t2.clientX,y:t2.clientY}}};
con.ontouchend=e=>{for(const t of e.changedTouches)delete touches[t.identifier]};
function updateMinimap(){const ctx=mmCanvas.getContext('2d');ctx.clearRect(0,0,240,160);const sx=240/tW,sy=160/tH,ms=Math.min(sx,sy)*0.9;const ox=(240-tW*ms)/2,oy=(160-tH*ms)/2;ctx.fillStyle='#0a0a2a';ctx.fillRect(0,0,240,160);EO.forEach((era,ri)=>{const y=ri*(nH+eGap)+eLH+30;ctx.fillStyle=ERAS[era].c+'30';ctx.fillRect(ox,oy+y*ms,tW*ms,(nH+eGap)*ms);ctx.fillStyle=ERAS[era].c+'80';ctx.font='8px sans-serif';ctx.fillText(ERAS[era].n,ox+2,oy+y*ms-2)});Object.entries(I).forEach(([id,it])=>{if(!pos[id])return;const p=pos[id];const d=disc.has(id);ctx.fillStyle=d?ERAS[it.era].c:'#333';ctx.fillRect(ox+p.px*ms,oy+p.py*ms,Math.max(2,nW*ms),Math.max(2,nH*ms))});const cw=con.clientWidth,ch=con.clientHeight;const vx=(-panX/scale)*ms+ox,vy=(-panY/scale)*ms+oy;const vw=(cw/scale)*ms,vh=(ch/scale)*ms;vpDiv.style.left=(vx/240*100)+'%';vpDiv.style.top=(vy/160*100)+'%';vpDiv.style.width=(vw/240*100)+'%';vpDiv.style.height=(vh/160*100)+'%'}
fitToScreen();
}
function showEnc(){document.getElementById('em').classList.add('show');renderEnc()}
function renderEnc(){
const body=document.getElementById('eb2');let h='<div class="egrid">';
const sorted=[...disc].sort((a,b)=>{const ea=EO.indexOf(I[a].era),eb=EO.indexOf(I[b].era);return ea!==eb?ea-eb:a.localeCompare(b)});
sorted.forEach(id=>{const it=I[id];const era=ERAS[it.era];const recipe=R.find(r=>r.r===id);let rs='';if(recipe)rs=`${recipe.i.map(x=>I[x].e).join('+')} → ${P[recipe.p].i}${P[recipe.p].n}${recipe.req?' (装备'+I[recipe.req].n+')':''}${recipe.need?' (需'+I[recipe.need].n+')':''}`;
let props='';if(it.mp>0)props+=` 熔点:${it.mp}°C`;if(it.density>0)props+=` 密度:${it.density}`;
h+=`<div class="ecard"><span class="ee">${it.e}</span><div class="ei"><div class="en">${it.n}</div>${it.c?`<div class="ec">${it.c}</div>`:''}<span class="ea" style="background:${era.c}22;color:${era.c}">${era.i} ${era.n}</span><div class="ed">${it.d}</div>${props?`<div class="eprop"><b>${props}</b></div>`:''}${rs?`<div class="er">${rs}</div>`:'<div class="er">基础元素</div>'}</div></div>`});
h+='</div>';body.innerHTML=h;
}
function saveGame(){try{localStorage.setItem('tevr3',JSON.stringify([...disc]))}catch(e){}saveToServer()}
function loadGame(){try{const s=localStorage.getItem('tevr3');if(s){const a=JSON.parse(s);if(a.length>0)disc=new Set(a)}}catch(e){}loadFromServer()}
async function saveToServer(){const t=localStorage.getItem('token');if(!t)return;try{await fetch('/api/progress/realistic',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({discovered:[...disc]})})}catch(e){}}
async function loadFromServer(){try{const s=localStorage.getItem('tevr3');if(s){const a=JSON.parse(s);if(a.length>0)disc=new Set(a)}}catch(e){}const t=localStorage.getItem('token');if(!t)return;try{const res=await fetch('/api/progress/realistic',{headers:{'Authorization':'Bearer '+t}});const r=await res.json();if(r.ok&&r.discovered&&r.discovered.length>0){disc=new Set(r.discovered);localStorage.setItem('tevr3',JSON.stringify([...disc]))}}catch(e){}}
function resetGame(){if(!confirm('确定重置？所有进度将丢失！'))return;disc=new Set(BASE);slots=[null,null,null,null];toolSlot=null;selProc='handcraft';curFilter='all';clearAll();renderProc();renderCond();renderFilter();renderItems();updateTemp();updateProgress();updateHints();localStorage.removeItem('tevr3');saveToServer()}
async function initAsync(){await loadFromServer();renderCraft();renderItems();renderFilter();renderProc();renderCond();updateTemp();updateProgress();updateHints()}
init();initAsync();
document.addEventListener('touchmove',function(e){},{passive:true});

</script>
